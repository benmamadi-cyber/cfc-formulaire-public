<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <!-- Maison en chantier — illustration d'arrière-plan (tons doux) -->
  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- Sol -->
    <line x1="8" y1="432" x2="672" y2="432" stroke="#c9ccd2" stroke-width="5"/>

    <!-- Grue -->
    <g stroke="#eec19a" stroke-width="6" fill="none">
      <line x1="92" y1="432" x2="92" y2="118"/>
      <line x1="60" y1="118" x2="260" y2="118"/>
      <line x1="92" y1="86" x2="92" y2="118"/>
      <line x1="60" y1="118" x2="92" y2="86"/>
      <line x1="92" y1="86" x2="170" y2="118"/>
      <line x1="76" y1="432" x2="108" y2="432"/>
      <line x1="92" y1="380" x2="108" y2="340"/>
      <line x1="92" y1="340" x2="108" y2="300"/>
      <line x1="92" y1="300" x2="108" y2="260"/>
      <line x1="92" y1="260" x2="108" y2="220"/>
      <line x1="92" y1="220" x2="108" y2="180"/>
    </g>
    <line x1="218" y1="118" x2="218" y2="178" stroke="#c9ccd2" stroke-width="3"/>
    <path d="M218 168 l-8 12 h16 z" fill="#c9ccd2"/>
    <rect x="200" y="180" width="36" height="22" rx="2" fill="#eab8c4"/>

    <!-- Murs en parpaings (partiellement montés) -->
    <g fill="#f4e3d5" stroke="#dcbca0" stroke-width="3">
      <rect x="300" y="302" width="250" height="130"/>
    </g>
    <g stroke="#dcbca0" stroke-width="2">
      <line x1="300" y1="335" x2="550" y2="335"/>
      <line x1="300" y1="368" x2="550" y2="368"/>
      <line x1="300" y1="400" x2="550" y2="400"/>
      <line x1="340" y1="302" x2="340" y2="335"/>
      <line x1="420" y1="302" x2="420" y2="335"/>
      <line x1="500" y1="302" x2="500" y2="335"/>
      <line x1="320" y1="335" x2="320" y2="368"/>
      <line x1="480" y1="335" x2="480" y2="368"/>
      <line x1="360" y1="368" x2="360" y2="400"/>
      <line x1="520" y1="368" x2="520" y2="400"/>
    </g>
    <!-- rangée de parpaings inachevée en haut du mur -->
    <g fill="#eed3bd" stroke="#dcbca0" stroke-width="2">
      <rect x="300" y="284" width="44" height="18"/>
      <rect x="348" y="284" width="44" height="18"/>
      <rect x="396" y="284" width="44" height="18"/>
    </g>

    <!-- Ouvertures : porte et fenêtre -->
    <rect x="330" y="352" width="46" height="80" fill="#fbf6f1" stroke="#dcbca0" stroke-width="3"/>
    <rect x="450" y="345" width="56" height="46" fill="#fbf6f1" stroke="#dcbca0" stroke-width="3"/>

    <!-- Charpente du toit (poutres apparentes) -->
    <g stroke="#d9a878" stroke-width="6" fill="none">
      <path d="M288 302 L425 200 L562 302"/>
      <line x1="425" y1="200" x2="425" y2="302"/>
      <line x1="356" y1="251" x2="356" y2="302"/>
      <line x1="494" y1="251" x2="494" y2="302"/>
      <line x1="322" y1="277" x2="425" y2="277"/>
      <line x1="425" y1="277" x2="528" y2="277"/>
      <line x1="390" y1="226" x2="460" y2="226"/>
    </g>

    <!-- Échafaudage à droite -->
    <g stroke="#c9ccd2" stroke-width="5" fill="none">
      <line x1="580" y1="432" x2="580" y2="240"/>
      <line x1="640" y1="432" x2="640" y2="240"/>
      <line x1="572" y1="300" x2="648" y2="300"/>
      <line x1="572" y1="360" x2="648" y2="360"/>
      <line x1="580" y1="360" x2="640" y2="300"/>
      <line x1="580" y1="300" x2="640" y2="240"/>
      <line x1="572" y1="240" x2="648" y2="240"/>
    </g>
    <rect x="568" y="232" width="84" height="8" rx="2" fill="#e3c6ab"/>

    <!-- Échelle contre le mur -->
    <g stroke="#d9a878" stroke-width="4" fill="none">
      <line x1="252" y1="432" x2="296" y2="310"/>
      <line x1="276" y1="432" x2="320" y2="310"/>
      <line x1="262" y1="408" x2="286" y2="408"/>
      <line x1="270" y1="384" x2="294" y2="384"/>
      <line x1="278" y1="360" x2="302" y2="360"/>
      <line x1="286" y1="336" x2="310" y2="336"/>
    </g>

    <!-- Tas de briques -->
    <g fill="#eab8c4" stroke="#d9a0ae" stroke-width="2">
      <rect x="150" y="414" width="34" height="16"/>
      <rect x="188" y="414" width="34" height="16"/>
      <rect x="168" y="398" width="34" height="16"/>
    </g>

    <!-- Bétonnière -->
    <g>
      <line x1="620" y1="432" x2="600" y2="396" stroke="#c9ccd2" stroke-width="4"/>
      <line x1="588" y1="432" x2="604" y2="398" stroke="#c9ccd2" stroke-width="4"/>
      <ellipse cx="606" cy="386" rx="22" ry="18" fill="#f0c9a2" stroke="#dcae7e" stroke-width="3" transform="rotate(-20 606 386)"/>
      <circle cx="606" cy="386" r="5" fill="#dcae7e"/>
    </g>

    <!-- Brouette de sable -->
    <g stroke="#c9ccd2" stroke-width="4" fill="none">
      <path d="M40 400 h44 l-8 22 h-28 z" fill="#f4e3d5"/>
      <circle cx="62" cy="428" r="7"/>
      <line x1="84" y1="400" x2="102" y2="392"/>
    </g>
  </g>
</svg>
