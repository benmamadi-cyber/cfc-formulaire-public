# Reverse proxy Nginx + TLS pour le formulaire public CFC.
# Adapter server_name et les chemins de certificat, puis :
#   sudo ln -s /etc/nginx/sites-available/cfc-formulaire /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certificat : recommandé via certbot (Let's Encrypt) :
#   sudo certbot --nginx -d formulaire.creditfoncier.cm

server {
    listen 80;
    server_name formulaire.creditfoncier.cm;
    # Redirection systématique vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name formulaire.creditfoncier.cm;

    ssl_certificate     /etc/letsencrypt/live/formulaire.creditfoncier.cm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/formulaire.creditfoncier.cm/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # En-têtes de sécurité
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 1m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
